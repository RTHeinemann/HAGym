script:
  fitness_start_workout:
    alias: Fitness Start Workout
    mode: single
    sequence:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.fitness_workout_active
      - service: input_text.set_value
        target:
          entity_id: input_text.fitness_set_notes
        data:
          value: ""
      - service: input_select.select_option
        target:
          entity_id: input_select.fitness_active_exercise
        data:
          option: Select Exercise
      - service: timer.cancel
        target:
          entity_id: timer.fitness_rest_timer
      - service: input_number.set_value
        target:
          entity_id:
            - input_number.fitness_set_number_bench_press
            - input_number.fitness_set_number_squat
            - input_number.fitness_set_number_deadlift
            - input_number.fitness_set_number_shoulder_press
            - input_number.fitness_set_number_row
            - input_number.fitness_set_number_lat_pulldown
            - input_number.fitness_set_number_bicep_curl
            - input_number.fitness_set_number_tricep_pushdown
        data:
          value: 0
      - service: logbook.log
        data:
          name: Fitness Workout
          entity_id: input_boolean.fitness_workout_active
          message: Workout started. Current set counters reset.

  fitness_finish_workout:
    alias: Fitness Finish Workout
    mode: single
    sequence:
      - service: timer.cancel
        target:
          entity_id: timer.fitness_rest_timer
      - service: input_select.select_option
        target:
          entity_id: input_select.fitness_active_exercise
        data:
          option: Select Exercise
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.fitness_workout_active
      - service: logbook.log
        data:
          name: Fitness Workout
          entity_id: input_boolean.fitness_workout_active
          message: Workout finished. Timer stopped and active exercise cleared.

  fitness_save_set:
    alias: Fitness Save Set
    mode: queued
    sequence:
      - variables:
          workout_active: "{{ is_state('input_boolean.fitness_workout_active', 'on') }}"
          active_exercise: "{{ states('input_select.fitness_active_exercise') }}"
          no_exercise_selected: >
            {{ active_exercise in ['unknown', 'unavailable', '', 'None', 'Select Exercise'] }}
          exercise_key: "{{ active_exercise | lower | replace(' ', '_') }}"
          weight: "{{ states('input_number.fitness_input_weight') | float(0) }}"
          reps: "{{ states('input_number.fitness_input_reps') | int(0) }}"
          volume: "{{ (weight * reps) | round(2) }}"
          weight_unit: "{{ state_attr('input_number.fitness_input_weight', 'unit_of_measurement') | default('kg', true) }}"
          valid_exercises: >
            {{ state_attr('input_select.fitness_active_exercise', 'options')
                | default([], true)
                | map('lower')
                | map('replace', ' ', '_')
                | reject('equalto', 'select_exercise')
                | list }}
          set_number_entity: "{{ 'input_number.fitness_set_number_' ~ exercise_key if exercise_key in valid_exercises and not no_exercise_selected else none }}"
          lifetime_set_count_entity: "{{ 'input_number.fitness_lifetime_set_count_' ~ exercise_key if exercise_key in valid_exercises and not no_exercise_selected else none }}"
          last_set_entity: "{{ 'input_text.fitness_last_set_' ~ exercise_key if exercise_key in valid_exercises else none }}"
          total_volume_entity: "{{ 'input_number.fitness_total_volume_' ~ exercise_key if exercise_key in valid_exercises else none }}"
          pr_entity: "{{ 'input_number.fitness_pr_' ~ exercise_key if exercise_key in valid_exercises else none }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ not workout_active }}"
            sequence:
              - service: persistent_notification.create
                data:
                  notification_id: fitness_save_set_error
                  title: Fitness Save Set Failed
                  message: Unable to save set because no workout is currently active.
              - service: logbook.log
                data:
                  name: Fitness Workout
                  entity_id: input_boolean.fitness_workout_active
                  message: Unable to save set. No active workout.
          - conditions:
              - condition: template
                value_template: "{{ no_exercise_selected }}"
            sequence:
              - service: persistent_notification.create
                data:
                  notification_id: fitness_save_set_error
                  title: Fitness Save Set Failed
                  message: Unable to save set because no exercise is selected.
              - service: logbook.log
                data:
                  name: Fitness Workout
                  entity_id: input_select.fitness_active_exercise
                  message: Unable to save set. No exercise selected.
          - conditions:
              - condition: template
                value_template: "{{ weight <= 0 or reps <= 0 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  notification_id: fitness_save_set_error
                  title: Fitness Save Set Failed
                  message: >
                    Unable to save set. Weight and reps must both be greater than zero
                    (received {{ weight }} {{ weight_unit }}, {{ reps }} reps).
              - service: logbook.log
                data:
                  name: Fitness Workout
                  entity_id: input_select.fitness_active_exercise
                  message: "Unable to save set. Invalid inputs: {{ reps }} reps @ {{ weight }} {{ weight_unit }}."
          - conditions:
              - condition: template
                value_template: >
                  {{ set_number_entity is none
                     or lifetime_set_count_entity is none
                     or last_set_entity is none
                     or total_volume_entity is none
                     or pr_entity is none
                     or states(set_number_entity) in ['unknown', 'unavailable']
                     or states(lifetime_set_count_entity) in ['unknown', 'unavailable']
                     or states(last_set_entity) in ['unknown', 'unavailable']
                     or states(total_volume_entity) in ['unknown', 'unavailable']
                     or states(pr_entity) in ['unknown', 'unavailable'] }}
            sequence:
              - service: persistent_notification.create
                data:
                  notification_id: fitness_save_set_error
                  title: Fitness Save Set Failed
                  message: >
                    Unable to save set because one or more required entities are missing or unavailable
                    for exercise "{{ active_exercise }}".
              - service: logbook.log
                data:
                  name: Fitness Workout
                  entity_id: input_select.fitness_active_exercise
                  message: "Unable to save set. Missing or unavailable entities for exercise: {{ active_exercise }}."
          - conditions:
              - condition: template
                value_template: >
                  {{ set_number_entity is not none
                     and lifetime_set_count_entity is not none
                     and states(set_number_entity) not in ['unknown', 'unavailable']
                     and states(lifetime_set_count_entity) not in ['unknown', 'unavailable']
                     and states(last_set_entity) not in ['unknown', 'unavailable']
                     and states(total_volume_entity) not in ['unknown', 'unavailable']
                     and states(pr_entity) not in ['unknown', 'unavailable'] }}
            sequence:
              - variables:
                  next_set_number: "{{ states(set_number_entity) | int(0) + 1 }}"
                  next_lifetime_set_count: "{{ states(lifetime_set_count_entity) | int(0) + 1 }}"
                  new_total_volume: "{{ (states(total_volume_entity) | float(0) + volume) | round(2) }}"
                  current_pr: "{{ states(pr_entity) | float(0) }}"
                  set_summary: "Set {{ next_set_number }}: {{ reps }} reps @ {{ weight }} {{ weight_unit }} ({{ volume }} {{ weight_unit }})"
              - service: input_number.set_value
                target:
                  entity_id: "{{ set_number_entity }}"
                data:
                  value: "{{ next_set_number }}"
              - service: input_number.set_value
                target:
                  entity_id: "{{ lifetime_set_count_entity }}"
                data:
                  value: "{{ next_lifetime_set_count }}"
              - service: input_text.set_value
                target:
                  entity_id: "{{ last_set_entity }}"
                data:
                  value: "{{ set_summary }}"
              - service: input_number.set_value
                target:
                  entity_id: "{{ total_volume_entity }}"
                data:
                  value: "{{ new_total_volume }}"
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ weight > current_pr }}"
                    sequence:
                      - service: input_number.set_value
                        target:
                          entity_id: "{{ pr_entity }}"
                        data:
                          value: "{{ weight }}"
              - service: timer.start
                target:
                  entity_id: timer.fitness_rest_timer
              - service: logbook.log
                data:
                  name: Fitness Workout
                  entity_id: input_select.fitness_active_exercise
                  message: "{{ active_exercise }} - {{ set_summary }}"
