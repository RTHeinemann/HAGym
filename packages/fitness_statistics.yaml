        state: "{{ states('sensor.fitness_volume_monthly_shoulder_press') | float(0) | round(2) }}"
      - name: Fitness Muscle Volume Monthly Back
        unique_id: fitness_muscle_volume_monthly_back
        unit_of_measurement: kg
        state: >
          {{ (states('sensor.fitness_volume_monthly_row') | float(0)
             + states('sensor.fitness_volume_monthly_lat_pulldown') | float(0)) | round(2) }}
      - name: Fitness Muscle Volume Monthly Biceps
        unique_id: fitness_muscle_volume_monthly_biceps
        unit_of_measurement: kg
        state: "{{ states('sensor.fitness_volume_monthly_bicep_curl') | float(0) | round(2) }}"
      - name: Fitness Muscle Volume Monthly Triceps
        unique_id: fitness_muscle_volume_monthly_triceps
        unit_of_measurement: kg
        state: "{{ states('sensor.fitness_volume_monthly_tricep_pushdown') | float(0) | round(2) }}"
      - name: Fitness Muscle Volume Yearly Chest
        unique_id: fitness_muscle_volume_yearly_chest
        unit_of_measurement: kg
        state: "{{ states('sensor.fitness_volume_yearly_bench_press') | float(0) | round(2) }}"
      - name: Fitness Muscle Volume Yearly Legs
        unique_id: fitness_muscle_volume_yearly_legs
        unit_of_measurement: kg
        state: "{{ states('sensor.fitness_volume_yearly_squat') | float(0) | round(2) }}"
      - name: Fitness Muscle Volume Yearly Posterior Chain
        unique_id: fitness_muscle_volume_yearly_posterior_chain
        unit_of_measurement: kg
        state: "{{ states('sensor.fitness_volume_yearly_deadlift') | float(0) | round(2) }}"
      - name: Fitness Muscle Volume Yearly Shoulders
        unique_id: fitness_muscle_volume_yearly_shoulders
        unit_of_measurement: kg
        state: "{{ states('sensor.fitness_volume_yearly_shoulder_press') | float(0) | round(2) }}"
      - name: Fitness Muscle Volume Yearly Back
        unique_id: fitness_muscle_volume_yearly_back
        unit_of_measurement: kg
        state: >
          {{ (states('sensor.fitness_volume_yearly_row') | float(0)
             + states('sensor.fitness_volume_yearly_lat_pulldown') | float(0)) | round(2) }}
      - name: Fitness Muscle Volume Yearly Biceps
        unique_id: fitness_muscle_volume_yearly_biceps
        unit_of_measurement: kg
        state: "{{ states('sensor.fitness_volume_yearly_bicep_curl') | float(0) | round(2) }}"
      - name: Fitness Muscle Volume Yearly Triceps
        unique_id: fitness_muscle_volume_yearly_triceps
        unit_of_measurement: kg
        state: "{{ states('sensor.fitness_volume_yearly_tricep_pushdown') | float(0) | round(2) }}"
      - name: Fitness Active Workout Summary
        unique_id: fitness_active_workout_summary
        state: >
          {% set is_active = is_state('input_boolean.fitness_workout_active', 'on') %}
          {% if not is_active %}
            inactive
          {% else %}
            {{ states('input_select.fitness_active_exercise') }}
          {% endif %}
        attributes:
          workout_active: "{{ is_state('input_boolean.fitness_workout_active', 'on') }}"
          active_exercise: "{{ states('input_select.fitness_active_exercise') }}"
          current_weight: "{{ states('input_number.fitness_input_weight') | float(0) }}"
          current_reps: "{{ states('input_number.fitness_input_reps') | int(0) }}"
          current_set_number_for_active_exercise: >
            {% set active = states('input_select.fitness_active_exercise') %}
            {% set invalid = ['unknown', 'unavailable', '', 'Select Exercise'] %}
            {% if active in invalid %}
              {{ none }}
            {% else %}
              {{ states('input_number.fitness_set_number_' ~ (active | lower | replace(' ', '_'))) | int(0) }}
            {% endif %}
          current_set_volume: >
            {{ ((states('input_number.fitness_input_weight') | float(0))
               * (states('input_number.fitness_input_reps') | int(0))) | round(2) }}
          rest_timer_state: "{{ states('timer.fitness_rest_timer') }}"
          notes: "{{ states('input_text.fitness_set_notes') }}"

