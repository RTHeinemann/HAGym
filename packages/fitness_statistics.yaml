      - name: Fitness Recovery Bench Press
        unique_id: fitness_recovery_bench_press
        state: >
          {% set days = states('sensor.fitness_days_since_bench_press') %}
          {% if days in ['unknown', 'unavailable', 'none', ''] %}
            unknown
          {% elif (days | float(0)) < 1 %}
            freshly_trained
          {% elif (days | float(0)) < 3 %}
            recovering
          {% elif (days | float(0)) < 7 %}
            ready
          {% else %}
            stale
          {% endif %}
        attributes:
          days_since: "{{ states('sensor.fitness_days_since_bench_press') }}"
          last_trained: "{{ states('input_datetime.fitness_last_trained_bench_press') }}"
          recommended_action: >
            {% set status = states('sensor.fitness_recovery_bench_press') %}
            {% if status == 'freshly_trained' %}Avoid heavy repeat work unless planned.
            {% elif status == 'recovering' %}Light or accessory work may be suitable.
            {% elif status == 'ready' %}Good candidate for training.
            {% elif status == 'stale' %}Exercise has not been trained recently.
            {% else %}No recommendation available.
            {% endif %}
