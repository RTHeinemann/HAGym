# Requires apexcharts-card
views:
  - title: Fitness Analytics
    path: analytics
    cards:
      - type: custom:apexcharts-card
        header:
          title: Yearly Volume
          show: true
        series:
          - entity: sensor.fitness_volume_yearly
            name: Volume
      - type: custom:apexcharts-card
        header:
          title: Monthly Volume
          show: true
        series:
          - entity: sensor.fitness_volume_monthly
            name: Volume
