start_workout:
  name: Start Workout
  description: Marks the start of a workout session for the calling Home Assistant user context when available.

finish_workout:
  name: Finish Workout
  description: Marks the end of a workout session for the calling Home Assistant user context when available.

save_set:
  name: Save Set
  description: Logs a completed exercise set for the calling Home Assistant user context. Exercise can be an exercise_id or a display name. Equipment is stored from active equipment selection or mapped from the exercise. If no workout is active for that user, an implicit workout is created and finished automatically.
  fields:
    exercise:
      name: Exercise
      description: Name of the exercise performed.
      required: true
      example: "Bench Press"
      selector:
        text:
    weight:
      name: Weight
      description: Weight used (in kg or lb, as preferred).
      required: true
      example: 80
      selector:
        number:
          min: 0
          max: 1000
          step: 0.5
    reps:
      name: Reps
      description: Number of repetitions completed.
      required: true
      example: 10
      selector:
        number:
          min: 1
          max: 999
          step: 1
          mode: box
    notes:
      name: Notes
      description: Optional notes about the set.
      required: false
      example: "Felt strong today"
      selector:
        text:

save_current_set:
  name: Save Current Set
  description: Saves a set using current active_exercise, weight, reps, and notes from integration runtime state for the calling Home Assistant user.

select_user:
  name: Select User
  description: Sets the selected user id used for personal dashboard statistics.
  fields:
    user_id:
      name: User ID
      description: Optional stored HAGym user id. If omitted, selected user fallback is reset.
      required: false
      selector:
        text:

refresh_users:
  name: Refresh Users
  description: Refreshes known users from the HAGym users table and refreshes statistics.

select_equipment:
  name: Select Equipment
  description: Sets the active equipment filter for dashboard-driven exercise selection.
  fields:
    equipment_id:
      name: Equipment ID
      description: Optional equipment id (for example cable_tower). Leave empty to show all exercises.
      required: false
      selector:
        text:

add_exercise:
  name: Add Exercise
  description: Adds or reactivates an exercise in the SQLite catalog and refreshes runtime exercise options/statistics.
  fields:
    exercise_id:
      name: Exercise ID
      description: Stable unique ID (lowercase/underscore recommended), for example bench_press.
      required: true
      selector:
        text:
    name_en:
      name: English Name
      description: English display name.
      required: true
      selector:
        text:
    name_de:
      name: German Name
      description: Optional German display name.
      required: false
      selector:
        text:
    muscle_group:
      name: Muscle Group
      description: Optional muscle group slug (e.g. chest, legs, back).
      required: false
      selector:
        text:
    equipment:
      name: Equipment
      description: Optional equipment label (e.g. barbell, dumbbell, machine).
      required: false
      selector:
        text:
    equipment_id:
      name: Equipment ID
      description: Optional equipment catalog id mapping (e.g. cable_tower).
      required: false
      selector:
        text:
    enabled:
      name: Enabled
      description: Whether the exercise appears in active exercise options.
      required: false
      default: true
      selector:
        boolean:
    sort_order:
      name: Sort Order
      description: Lower values appear first in the active exercise select.
      required: false
      selector:
        number:
          min: -10000
          max: 10000
          step: 1
          mode: box

update_exercise:
  name: Update Exercise
  description: Updates exercise catalog metadata by exercise_id and refreshes runtime exercise options/statistics.
  fields:
    exercise_id:
      name: Exercise ID
      description: Existing exercise ID to update.
      required: true
      selector:
        text:
    name_en:
      name: English Name
      description: Optional new English display name.
      required: false
      selector:
        text:
    name_de:
      name: German Name
      description: Optional new German display name.
      required: false
      selector:
        text:
    muscle_group:
      name: Muscle Group
      description: Optional new muscle group slug.
      required: false
      selector:
        text:
    equipment:
      name: Equipment
      description: Optional new equipment label.
      required: false
      selector:
        text:
    equipment_id:
      name: Equipment ID
      description: Optional new equipment catalog id mapping.
      required: false
      selector:
        text:
    enabled:
      name: Enabled
      description: Optional enabled flag.
      required: false
      selector:
        boolean:
    sort_order:
      name: Sort Order
      description: Optional new sort order.
      required: false
      selector:
        number:
          min: -10000
          max: 10000
          step: 1
          mode: box

disable_exercise:
  name: Disable Exercise
  description: Disables an exercise by exercise_id so it no longer appears in active exercise options.
  fields:
    exercise_id:
      name: Exercise ID
      description: Existing exercise ID to disable.
      required: true
      selector:
        text:

refresh_exercises:
  name: Refresh Exercises
  description: Re-seeds default built-in exercises in SQLite and refreshes runtime exercise options/statistics.

add_muscle_group:
  name: Add Muscle Group
  description: Adds or reactivates a muscle group in the SQLite catalog and refreshes muscle group statistics.
  fields:
    muscle_group_id:
      name: Muscle Group ID
      description: Stable unique ID (lowercase/underscore recommended), for example hamstrings.
      required: true
      selector:
        text:
    name_en:
      name: English Name
      description: English display name.
      required: true
      selector:
        text:
    name_de:
      name: German Name
      description: Optional German display name.
      required: false
      selector:
        text:
    description:
      name: Description
      description: Optional catalog description.
      required: false
      selector:
        text:
    icon:
      name: Icon
      description: Optional MDI icon, for example mdi:arm-flex.
      required: false
      selector:
        text:
    body_region:
      name: Body Region
      description: Optional body region label, for example upper_body.
      required: false
      selector:
        text:
    enabled:
      name: Enabled
      description: Whether this muscle group appears in active options/device list.
      required: false
      default: true
      selector:
        boolean:
    sort_order:
      name: Sort Order
      description: Lower values appear first.
      required: false
      selector:
        number:
          min: -10000
          max: 10000
          step: 1
          mode: box

update_muscle_group:
  name: Update Muscle Group
  description: Updates muscle group metadata by muscle_group_id and refreshes muscle group statistics.
  fields:
    muscle_group_id:
      name: Muscle Group ID
      description: Existing muscle group ID to update.
      required: true
      selector:
        text:
    name_en:
      name: English Name
      description: Optional new English display name.
      required: false
      selector:
        text:
    name_de:
      name: German Name
      description: Optional new German display name.
      required: false
      selector:
        text:
    description:
      name: Description
      description: Optional new description.
      required: false
      selector:
        text:
    icon:
      name: Icon
      description: Optional new icon.
      required: false
      selector:
        text:
    body_region:
      name: Body Region
      description: Optional new body region.
      required: false
      selector:
        text:
    enabled:
      name: Enabled
      description: Optional enabled flag.
      required: false
      selector:
        boolean:
    sort_order:
      name: Sort Order
      description: Optional new sort order.
      required: false
      selector:
        number:
          min: -10000
          max: 10000
          step: 1
          mode: box

disable_muscle_group:
  name: Disable Muscle Group
  description: Disables a muscle group by muscle_group_id so it no longer appears in active muscle group options.
  fields:
    muscle_group_id:
      name: Muscle Group ID
      description: Existing muscle group ID to disable.
      required: true
      selector:
        text:

assign_muscle_group_to_exercise:
  name: Assign Muscle Group To Exercise
  description: Assigns one muscle group to one exercise with role and weight factor.
  fields:
    exercise_id:
      name: Exercise ID
      description: Existing exercise ID.
      required: true
      selector:
        text:
    muscle_group_id:
      name: Muscle Group ID
      description: Existing muscle group ID.
      required: true
      selector:
        text:
    role:
      name: Role
      description: Mapping role. Allowed values are primary, secondary, stabilizer.
      required: false
      selector:
        select:
          options:
            - primary
            - secondary
            - stabilizer
    weight_factor:
      name: Weight Factor
      description: Weighted share of logged set volume attributed to this muscle group.
      required: false
      selector:
        number:
          min: 0.01
          max: 2.0
          step: 0.05
          mode: box

refresh_muscle_groups:
  name: Refresh Muscle Groups
  description: Refreshes muscle group catalog and derived muscle group statistics.

refresh_statistics:
  name: Refresh Statistics
  description: Refreshes cached global, personal, and household statistics from the SQLite database.

export_data:
  name: Export Data
  description: Exports users plus global, personal, and household statistics to /config/ha_fitness/export.json.
