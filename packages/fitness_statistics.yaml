      - name: Fitness Days Since Bench Press
        unique_id: fitness_days_since_bench_press
        unit_of_measurement: d
        state: >
          {% set last_trained = states('input_datetime.fitness_last_trained_bench_press') %}
          {% set dt = as_datetime(last_trained, default=none) %}
          {{ ((now() - dt).total_seconds() / 86400) | round(2) if dt is not none else none }}
