input_number:
  fitness_total_volume_bench_press:
    name: Fitness Total Volume Bench Press
    min: 0
    max: 9999999
    step: 0.01
    unit_of_measurement: kg
  fitness_total_volume_squat:
    name: Fitness Total Volume Squat
    min: 0
    max: 9999999
    step: 0.01
    unit_of_measurement: kg
  fitness_total_volume_deadlift:
    name: Fitness Total Volume Deadlift
    min: 0
    max: 9999999
    step: 0.01
    unit_of_measurement: kg
  fitness_total_volume_shoulder_press:
    name: Fitness Total Volume Shoulder Press
    min: 0
    max: 9999999
    step: 0.01
    unit_of_measurement: kg
  fitness_total_volume_row:
    name: Fitness Total Volume Row
    min: 0
    max: 9999999
    step: 0.01
    unit_of_measurement: kg
  fitness_total_volume_lat_pulldown:
    name: Fitness Total Volume Lat Pulldown
    min: 0
    max: 9999999
    step: 0.01
    unit_of_measurement: kg
  fitness_total_volume_bicep_curl:
    name: Fitness Total Volume Bicep Curl
    min: 0
    max: 9999999
    step: 0.01
    unit_of_measurement: kg
  fitness_total_volume_tricep_pushdown:
    name: Fitness Total Volume Tricep Pushdown
    min: 0
    max: 9999999
    step: 0.01
    unit_of_measurement: kg
  fitness_pr_bench_press:
    name: Fitness PR Bench Press
    min: 0
    max: 500
    step: 0.5
    unit_of_measurement: kg
  fitness_pr_squat:
    name: Fitness PR Squat
    min: 0
    max: 500
    step: 0.5
    unit_of_measurement: kg
  fitness_pr_deadlift:
    name: Fitness PR Deadlift
    min: 0
    max: 500
    step: 0.5
    unit_of_measurement: kg
  fitness_pr_shoulder_press:
    name: Fitness PR Shoulder Press
    min: 0
    max: 500
    step: 0.5
    unit_of_measurement: kg
  fitness_pr_row:
    name: Fitness PR Row
    min: 0
    max: 500
    step: 0.5
    unit_of_measurement: kg
  fitness_pr_lat_pulldown:
    name: Fitness PR Lat Pulldown
    min: 0
    max: 500
    step: 0.5
    unit_of_measurement: kg
  fitness_pr_bicep_curl:
    name: Fitness PR Bicep Curl
    min: 0
    max: 500
    step: 0.5
    unit_of_measurement: kg
  fitness_pr_tricep_pushdown:
    name: Fitness PR Tricep Pushdown
    min: 0
    max: 500
    step: 0.5
    unit_of_measurement: kg

template:
  - sensor:
      - name: Fitness PR Bench Press
        unique_id: fitness_pr_bench_press
        unit_of_measurement: kg
        state: "{{ states('input_number.fitness_pr_bench_press') | float(0) }}"
      - name: Fitness PR Squat
        unique_id: fitness_pr_squat
        unit_of_measurement: kg
        state: "{{ states('input_number.fitness_pr_squat') | float(0) }}"
      - name: Fitness PR Deadlift
        unique_id: fitness_pr_deadlift
        unit_of_measurement: kg
        state: "{{ states('input_number.fitness_pr_deadlift') | float(0) }}"
      - name: Fitness PR Shoulder Press
        unique_id: fitness_pr_shoulder_press
        unit_of_measurement: kg
        state: "{{ states('input_number.fitness_pr_shoulder_press') | float(0) }}"
      - name: Fitness PR Row
        unique_id: fitness_pr_row
        unit_of_measurement: kg
        state: "{{ states('input_number.fitness_pr_row') | float(0) }}"
      - name: Fitness PR Lat Pulldown
        unique_id: fitness_pr_lat_pulldown
        unit_of_measurement: kg
        state: "{{ states('input_number.fitness_pr_lat_pulldown') | float(0) }}"
      - name: Fitness PR Bicep Curl
        unique_id: fitness_pr_bicep_curl
        unit_of_measurement: kg
        state: "{{ states('input_number.fitness_pr_bicep_curl') | float(0) }}"
      - name: Fitness PR Tricep Pushdown
        unique_id: fitness_pr_tricep_pushdown
        unit_of_measurement: kg
        state: "{{ states('input_number.fitness_pr_tricep_pushdown') | float(0) }}"
      - name: Fitness Total Volume Bench Press
        unique_id: fitness_total_volume_bench_press
        unit_of_measurement: kg
        state_class: total_increasing
        state: "{{ states('input_number.fitness_total_volume_bench_press') | float(0) }}"
      - name: Fitness Total Volume Squat
        unique_id: fitness_total_volume_squat
        unit_of_measurement: kg
        state_class: total_increasing
        state: "{{ states('input_number.fitness_total_volume_squat') | float(0) }}"
      - name: Fitness Total Volume Deadlift
        unique_id: fitness_total_volume_deadlift
        unit_of_measurement: kg
        state_class: total_increasing
        state: "{{ states('input_number.fitness_total_volume_deadlift') | float(0) }}"
      - name: Fitness Total Volume Shoulder Press
        unique_id: fitness_total_volume_shoulder_press
        unit_of_measurement: kg
        state_class: total_increasing
        state: "{{ states('input_number.fitness_total_volume_shoulder_press') | float(0) }}"
      - name: Fitness Total Volume Row
        unique_id: fitness_total_volume_row
        unit_of_measurement: kg
        state_class: total_increasing
        state: "{{ states('input_number.fitness_total_volume_row') | float(0) }}"
      - name: Fitness Total Volume Lat Pulldown
        unique_id: fitness_total_volume_lat_pulldown
        unit_of_measurement: kg
        state_class: total_increasing
        state: "{{ states('input_number.fitness_total_volume_lat_pulldown') | float(0) }}"
      - name: Fitness Total Volume Bicep Curl
        unique_id: fitness_total_volume_bicep_curl
        unit_of_measurement: kg
        state_class: total_increasing
        state: "{{ states('input_number.fitness_total_volume_bicep_curl') | float(0) }}"
      - name: Fitness Total Volume Tricep Pushdown
        unique_id: fitness_total_volume_tricep_pushdown
        unit_of_measurement: kg
        state_class: total_increasing
        state: "{{ states('input_number.fitness_total_volume_tricep_pushdown') | float(0) }}"
      - name: Fitness Muscle Volume Chest
        unique_id: fitness_muscle_volume_chest
        unit_of_measurement: kg
        state: >
          {% set exercises = state_attr('sensor.fitness_metadata_exercises', 'exercises') | default({}, true) %}
          {% set ns = namespace(total=0) %}
          {% for exercise_key, exercise_meta in exercises.items() %}
            {% if exercise_meta.get('muscle_group') == 'chest' %}
              {% set ns.total = ns.total + (states('sensor.fitness_total_volume_' ~ exercise_key) | float(0)) %}
            {% endif %}
          {% endfor %}
          {{ ns.total | round(2) }}
      - name: Fitness Muscle Volume Legs
        unique_id: fitness_muscle_volume_legs
        unit_of_measurement: kg
        state: >
          {% set exercises = state_attr('sensor.fitness_metadata_exercises', 'exercises') | default({}, true) %}
          {% set ns = namespace(total=0) %}
          {% for exercise_key, exercise_meta in exercises.items() %}
            {% if exercise_meta.get('muscle_group') == 'legs' %}
              {% set ns.total = ns.total + (states('sensor.fitness_total_volume_' ~ exercise_key) | float(0)) %}
            {% endif %}
          {% endfor %}
          {{ ns.total | round(2) }}
      - name: Fitness Muscle Volume Posterior Chain
        unique_id: fitness_muscle_volume_posterior_chain
        unit_of_measurement: kg
        state: >
          {% set exercises = state_attr('sensor.fitness_metadata_exercises', 'exercises') | default({}, true) %}
          {% set ns = namespace(total=0) %}
          {% for exercise_key, exercise_meta in exercises.items() %}
            {% if exercise_meta.get('muscle_group') == 'posterior_chain' %}
              {% set ns.total = ns.total + (states('sensor.fitness_total_volume_' ~ exercise_key) | float(0)) %}
            {% endif %}
          {% endfor %}
          {{ ns.total | round(2) }}
      - name: Fitness Muscle Volume Shoulders
        unique_id: fitness_muscle_volume_shoulders
        unit_of_measurement: kg
        state: >
          {% set exercises = state_attr('sensor.fitness_metadata_exercises', 'exercises') | default({}, true) %}
          {% set ns = namespace(total=0) %}
          {% for exercise_key, exercise_meta in exercises.items() %}
            {% if exercise_meta.get('muscle_group') == 'shoulders' %}
              {% set ns.total = ns.total + (states('sensor.fitness_total_volume_' ~ exercise_key) | float(0)) %}
            {% endif %}
          {% endfor %}
          {{ ns.total | round(2) }}
      - name: Fitness Muscle Volume Back
        unique_id: fitness_muscle_volume_back
        unit_of_measurement: kg
        state: >
          {% set exercises = state_attr('sensor.fitness_metadata_exercises', 'exercises') | default({}, true) %}
          {% set ns = namespace(total=0) %}
          {% for exercise_key, exercise_meta in exercises.items() %}
            {% if exercise_meta.get('muscle_group') == 'back' %}
              {% set ns.total = ns.total + (states('sensor.fitness_total_volume_' ~ exercise_key) | float(0)) %}
            {% endif %}
          {% endfor %}
          {{ ns.total | round(2) }}
      - name: Fitness Muscle Volume Biceps
        unique_id: fitness_muscle_volume_biceps
        unit_of_measurement: kg
        state: >
          {% set exercises = state_attr('sensor.fitness_metadata_exercises', 'exercises') | default({}, true) %}
          {% set ns = namespace(total=0) %}
          {% for exercise_key, exercise_meta in exercises.items() %}
            {% if exercise_meta.get('muscle_group') == 'biceps' %}
              {% set ns.total = ns.total + (states('sensor.fitness_total_volume_' ~ exercise_key) | float(0)) %}
            {% endif %}
          {% endfor %}
          {{ ns.total | round(2) }}
      - name: Fitness Muscle Volume Triceps
        unique_id: fitness_muscle_volume_triceps
        unit_of_measurement: kg
        state: >
          {% set exercises = state_attr('sensor.fitness_metadata_exercises', 'exercises') | default({}, true) %}
          {% set ns = namespace(total=0) %}
          {% for exercise_key, exercise_meta in exercises.items() %}
            {% if exercise_meta.get('muscle_group') == 'triceps' %}
              {% set ns.total = ns.total + (states('sensor.fitness_total_volume_' ~ exercise_key) | float(0)) %}
            {% endif %}
          {% endfor %}
          {{ ns.total | round(2) }}

